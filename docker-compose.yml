version: "3.8"

services:

  mysql: 
    image: mysql:latest 
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress
      MYSQL_USER: user-wordpress
      MYSQL_PASSWORD: pwd-wordpress
    volumes:
      - ./mysql_data:/var/lib/mysql
    networks:
      - wpnet

  wordpress1:
    image: wordpress:latest
    container_name: wordpress1
    restart: always
    depends_on:
      - mysql
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: user-wordpress
      WORDPRESS_DB_PASSWORD: pwd-wordpress
    volumes:
      - ./html:/var/www/html
    networks:
      - wpnet

  wordpress2:
    image: wordpress:latest
    container_name: wordpress2
    restart: always
    depends_on:
      - mysql
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: user-wordpress
      WORDPRESS_DB_PASSWORD: pwd-wordpress
    volumes:
      - ./html:/var/www/html
    networks:
      - wpnet

  wordpress3:
    image: wordpress:latest
    container_name: wordpress3
    restart: always
    depends_on:
      - mysql
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: user-wordpress
      WORDPRESS_DB_PASSWORD: pwd-wordpress
    volumes:
      - ./html:/var/www/html
    networks:
      - wpnet

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    depends_on:
      - wordpress1
      - wordpress2
      - wordpress3
    ports:
      - "80:80"
    volumes:
      - ./html:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - wpnet

  locust:
    image: locustio/locust
    container_name: locust
    ports:
      - "8089:8089"
    volumes:
      - ./locust:/mnt/locust
    command: -f /mnt/locust/locustfile.py --host=http://nginx
    depends_on:
      - nginx
    networks:
      - wpnet

networks:
  wpnet: 
    driver: bridge 